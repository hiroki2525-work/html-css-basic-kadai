<!DOCTYPE html>
<html>
  <head>
    <h1>SAMURAIニュース</h1>
    <nav>
      <a href="https://www.google.com" >ホーム</a>
      <a href="https://www.google.com">社会</a>  
      <a href="https://www.google.com">経済</a>
      <a href="https://www.google.com">スポーツ</a>
      <a href="https://www.google.com">テクノロジー</a>
    </nav>
    <meta name="description" content="SAMURAIニュースのページです"
    <meta charset="utf-8">
  </head>
  <body>
    <header>
        <h1>SAMURAIニュース</h1>
    </header>

    <main>
      <article>
        <section>
          <h2>社会</h2>
          <h3>和菓子店も「トリックオアトリート！」</h3>
          <p>日本でも年々人気の高まるハロウィン<br>今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発をしました。</p>
          <audio src="../music/ichi.mp3" controls></audio>    
        </section>
        <section>
          <h3>私のおすすめ和菓子アンケートフォーム</h3>
            <form>
            <label>氏名</label>
            <input type="text" Placeholder="名前を入力してください">  
            <br>
            
            <label>年代</label>
            <select>
              <option value="10代">10代</option>
              <option value="20代">20代</option>
              <option value="30代">30代</option>
              <option value="40代">40代以上</option>
            </select>
            <br>
            
            <label>男性</label><input type="radio" name="gender">
            <label>女性</label><input type="radio" name="gender">
            <label>その他</label><input type="radio" name="gender">
            <br>

            <label>おすすめの和菓子の名称</label>
            <input type="text" Placeholder="例：みたらし団子">  
            <br>

            <label>おすすめの理由</label>
            <textarea></textarea>
            <br>

            <label>個人情報保護方針に同意する</label>
            <input type="checkbox" name="privacy">
            <br>

          </form>
        </section>
      </article>

      <article>
        <section>
          <h2>テクノロジー</h2>
          <p>SAMURAI硬式Youtubeで新しい動画をリリースしました。<br>動画の内容はHTML/CSSの解説です。</p>
        </section>
      </article>
    </main>

    <footer>
      <p>＠SAMURAIニュース</p>
    </footer>
  </body>
</html>
